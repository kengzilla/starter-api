spring.application.name=starter-api
server.port=8080

# H2 in-memory + no Flyway unless you switch to spring-boot.run.profiles=local
spring.profiles.default=test

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- HTTP logging (see LoggingProperties) ---
app.logging.enabled=true
app.logging.log-body-on-error=true
app.logging.log-body-debug=false
app.logging.max-body-bytes=8192

# --- Actuator + distributed tracing (Micrometer/Brave; logs include traceId/spanId in MDC when available) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.tracing.sampling.probability=1.0
